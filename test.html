<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BO55 - Nexus Engine Study</title>
    
    <link href="https://saucebosspizzeria.com/Content/normad-beta-desktop-css?v=VSCt4HLYcHhB-qw913vj20zyZi3cpqKQo7wjWC72fcg1" rel="stylesheet"/>
    <link href="https://saucebosspizzeria.com/Content/Theme/normad-beta-desktop-dark-gold-css?v=NpmtceIubFXgrF25KtC_APztcyyC50zi3t6ki1MaIhs1" rel="stylesheet"/>

    <style>
        /* INI KUNCI BIAR MIRIP NEXUS: Custom CSS */
        :root {
            --nexus-gold: #fba501;
            --nexus-dark: #02071c;
            --nexus-blue: #0a1849;
        }

        body {
            background-color: #000;
            font-family: Arial, sans-serif;
            margin: 0;
            color: #fff;
        }

        /* Form Login Atas */
        .nxs-header {
            background: var(--nexus-dark);
            border-bottom: 2px solid var(--nexus-gold);
            padding: 10px 0;
        }

        .login-box {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .nxs-input {
            background: #010417;
            border: 1px solid #1f3588;
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
        }

        .btn-gold {
            background: linear-gradient(to bottom, #fda601, #cc7100);
            border: none;
            color: #000;
            font-weight: bold;
            padding: 6px 15px;
            cursor: pointer;
            border-radius: 4px;
        }

        /* Banner */
        .nxs-banner {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .nxs-banner img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #1130a5;
        }

        /* Grid Game ala Nexus */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 15px;
        }

        .game-card {
            background: var(--nexus-blue);
            border: 1px solid #1f3588;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s;
            text-align: center;
            padding-bottom: 10px;
        }

        .game-card:hover {
            transform: scale(1.05);
            border-color: var(--nexus-gold);
        }

        .game-card img {
            width: 100%;
            height: auto;
        }

        .btn-play {
            background: #fba501;
            border: none;
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="nxs-header">
        <div class="login-box">
            <input type="text" class="nxs-input" placeholder="Username">
            <input type="password" class="nxs-input" placeholder="Password">
            <button class="btn-gold">LOGIN</button>
            <button class="btn-gold" style="background: #333; color: #fff; border: 1px solid #fba501;">DAFTAR</button>
        </div>
    </header>

    <div style="text-align:center; padding: 20px;">
        <img src="https://api2-rrq.imgnxb.com/images/Fc9AcE7Ias/favicon_1a4e293a-5015-4d34-b394-2eb800fb02bc_1773638893380.png" width="150" alt="Logo">
    </div>

    <div class="nxs-banner">
        <img src="https://api2-rrq.imgnxb.com/images/Fc9AcE7Ias/id_cbd_aac4e5e1-64ac-46fa-ab23-8d4a2c77cf41_1773015884210.jpg" alt="Promo Gacor">
    </div>

    <div class="game-grid">
        <div class="game-card">
            <img src="https://api2-rrq.imgnxb.com/images/PragmaticPlay/vs20olympgate.png" alt="Gates of Olympus">
            <div style="padding: 10px;">Gates of Olympus</div>
            <button class="btn-play">MAIN</button>
        </div>
        <div class="game-card">
            <img src="https://api2-rrq.imgnxb.com/images/PGSoft/mahjong-ways2.png" alt="Mahjong Ways 2">
            <div style="padding: 10px;">Mahjong Ways 2</div>
            <button class="btn-play">MAIN</button>
        </div>
        <div class="game-card">
            <img src="https://api2-rrq.imgnxb.com/images/PragmaticPlay/vs20starlight.png" alt="Starlight Princess">
            <div style="padding: 10px;">Starlight Princess</div>
            <button class="btn-play">MAIN</button>
        </div>
    </div>

</body>
</html>
